name: BigData CI/CD

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  ci-cd:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install oss2 requests pandas matplotlib python-docx

    - name: Configure connections
      run: |
        cat > config.json << 'EOF'
        {
            "oss": {
                "access_key_id": "${{ secrets.OSS_AK }}",
                "access_key_secret": "${{ secrets.OSS_SK }}",
                "endpoint": "oss-cn-hangzhou.aliyuncs.com",
                "bucket_name": "${{ secrets.OSS_BUCKET }}"
            },
            "clickhouse": {
                "host": "${{ secrets.CK_HOST }}",
                "port": 8123,
                "user": "bigdata",
                "password": "${{ secrets.CK_PASSWORD }}",
                "database": "laspeyres"
            }
        }
        EOF

    - name: "[1/4] Data validation"
      run: python validate_data.py

    - name: "[2/4] Unit test (allow failure)"
      continue-on-error: true
      run: python test_connector.py || echo "CK connection skipped (network)"

    - name: "[3/4] Integration test (allow failure)"
      continue-on-error: true
      run: python connector.py --skip-test --with-prices || echo "CK deploy skipped (network)"

    - name: "[4/4] Generate Laspeyres chart from local data"
      run: python analytics.py

    - name: Upload charts
      uses: actions/upload-artifact@v4
      with:
        name: laspeyres-charts
        path: output/