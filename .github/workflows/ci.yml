name: BigData CI/CD

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  ci-cd:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install oss2 requests pandas matplotlib

    - name: Configure connections
      run: |
        cat > config.json << 'EOF'
        {
            "oss": {
                "access_key_id": "${{ secrets.OSS_AK }}",
                "access_key_secret": "${{ secrets.OSS_SK }}",
                "endpoint": "oss-cn-hangzhou.aliyuncs.com",
                "bucket_name": "${{ secrets.OSS_BUCKET }}"
            },
            "clickhouse": {
                "host": "${{ secrets.CK_HOST }}",
                "port": 8123,
                "user": "bigdata",
                "password": "${{ secrets.CK_PASSWORD }}",
                "database": "laspeyres"
            }
        }
        EOF

    - name: Download data from OSS
      run: |
        mkdir -p data
        python -c "
        import oss2, json
        with open('config.json') as f:
            c = json.load(f)['oss']
        auth = oss2.Auth(c['access_key_id'], c['access_key_secret'])
        bucket = oss2.Bucket(auth, c['endpoint'], c['bucket_name'])

        # categories_utf8.csv is UTF-8, save directly
        r = bucket.get_object('data/categories_utf8.csv')
        with open('data/categories.csv', 'wb') as f:
            f.write(r.read())
        print('Downloaded: categories.csv (UTF-8)')

        # products.csv is GBK, decode then re-save as UTF-8
        r = bucket.get_object('data/products.csv')
        raw = r.read()
        text = raw.decode('gbk')
        with open('data/products.csv', 'w', encoding='utf-8') as f:
            f.write(text)
        print('Downloaded: products.csv (converted GBK->UTF-8)')
        "

    - name: "[1/4] Data validation"
      run: python validate_data.py

    - name: "[2/4] Unit test (allow failure)"
      continue-on-error: true
      run: python test_connector.py || echo "CK test skipped"

    - name: "[3/4] Integration test (allow failure)"
      continue-on-error: true
      timeout-minutes: 1
      run: python connector.py --skip-test --with-prices || echo "CK deploy skipped"

    - name: "[4/4] Generate Laspeyres chart"
      run: python analytics.py

    - name: Upload charts
      uses: actions/upload-artifact@v4
      with:
        name: laspeyres-charts
        path: output/